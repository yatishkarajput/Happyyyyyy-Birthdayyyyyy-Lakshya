<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happyyyyy Birthdayyyy Lakshyaaaa💗</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            margin: 0;
            padding: 0;
        }

        h1 {
            font-size: clamp(20px, 6vw, 40px);
            text-align: center;
            padding: 10px;
        }

        button {
            font-size: clamp(14px, 4vw, 18px);
            padding: 10px 20px;
        }

        .container {
            padding: 10px;
        }

        .gif-container img {
            width: 80%;
            max-width: 250px;
            height: auto;
        }
    </style>
</head>
<body>
    <div class="hearts-bg"></div>

    <div class="container">
        <h1> You love me, right?🌝👉👈</h1>

        <div class="gif-container">
            <img id="cat-gif" src="https://media.tenor.com/EBV7OT7ACfwAAAAj/u-u-qua-qua-u-quaa.gif" alt="cute character">
        </div>

        <div class="buttons">
            <button id="yes-btn" onclick="handleYesClick()">Yes</button>
            <button id="no-btn" onclick="handleNoClick()">No</button>
        </div>
        <div id="tease-toast"></div>
    </div>

    <audio id="bg-music" loop autoplay>
        <source src="bas.tera.mp3" type="audio/mpeg">
    </audio>



    <script src="script.js"></script>
</body>
</html>
